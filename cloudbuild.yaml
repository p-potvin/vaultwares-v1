# cloudbuild.yaml
steps:
# Build the unified Docker image
- name: 'gcr.io/cloud-builders/docker'
  args: 
  - 'build'
  - '-t'
  - '${_REGION}-docker.pkg.dev/vaultwares/vaultwares-service/vaultwares-service:${_TAG}'
  - '--build-arg'
  - 'GEMINI_API_KEY=${_GEMINI_API_KEY}'
  - '-f'
  - 'Dockerfile'
  - '.'

# Push the unified Docker image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', '${_REGION}-docker.pkg.dev/vaultwares/vaultwares-service/vaultwares-service:${_TAG}']

# Deploy the unified image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gcloud'
  args:
  - 'run'
  - 'deploy'
  - 'vaultwares-service'  # Unified Cloud Run service name
  - '--image'
  - '${_REGION}-docker.pkg.dev/vaultwares/vaultwares-service/vaultwares-service:${_TAG}'
  - '--region=${_REGION}'
  - '--platform=managed'
  - '--allow-unauthenticated'
  - '--set-env-vars'
  - 'DATABASE_URL=${_DATABASE_URL},JWT_SECRET=${_JWT_SECRET}'

images:
- '${_REGION}-docker.pkg.dev/vaultwares/vaultwares-service/vaultwares-service:${_TAG}'

substitutions:
  _REGION: us-central1
  _TAG: '$COMMIT_SHA'
  # Set these dynamically in your Cloud Build trigger configuration!
  _GEMINI_API_KEY: 'your-gemini-key'
  _DATABASE_URL: '' 
  _JWT_SECRET: 'super-secret-vaultwares-key'
