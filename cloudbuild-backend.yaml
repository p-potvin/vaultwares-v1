# cloudbuild-backend.yaml
steps:
# Build the backend Docker image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', '${_REGION}-docker.pkg.dev/vaultwares/backend-api-service/backend-api-service:${_TAG}', '-f', 'cfg/backend/Dockerfile', '.']

# Push the backend Docker image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', '${_REGION}-docker.pkg.dev/vaultwares/backend-api-service/backend-api-service:${_TAG}']

# Deploy the backend image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gcloud'
  args:
  - 'run'
  - 'deploy'
  - 'backend-api-service'  # Your backend Cloud Run service name
  - '--image'
  - '${_REGION}-docker.pkg.dev/vaultwares/backend-api-service/backend-api-service:${_TAG}'
  - '--region=${_REGION}'
  - '--platform=managed'
  - '--allow-unauthenticated' # Adjust authentication as needed, often public for frontends

images:
- '${_REGION}-docker.pkg.dev/vaultwares/backend-api-service/backend-api-service:${_TAG}'

substitutions:
  _REGION: us-central1
  _TAG: '$COMMIT_SHA' # You can use $COMMIT_SHA here for unique versions